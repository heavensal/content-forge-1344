# Name of your application. Used to uniquely configure containers.
service: contentforge_1344_rails

# Name of the container image (Docker Hub: adam1344/contentforge_1344_rails).
image: adam1344/contentforge_1344_rails

# Deploy to these servers.
servers:
  web:
    - 51.75.124.208
  # job:
  #   hosts:
  #     - 51.75.124.208
  #   cmd: bin/jobs

# Pas de nom de domaine : pas de Let's Encrypt. HTTP sur le port 3001 de l’hôte.
# (Sur Flipflapp : proxy.ssl + host — ici on reste en IP + port explicite.)
proxy:
  ssl: false
  forward_headers: true
  run:
    http_port: 3001

# Credentials for your image host.
registry:
  # server: registry.digitalocean.com / ghcr.io / ...
  username: adam1344
  # Always use an access token rather than real password when possible.
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets + .env).
env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
  clear:
    SOLID_QUEUE_IN_PUMA: true
    RAILS_ALLOWED_HOSTS: 51.75.124.208

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

volumes:
  - "contentforge_1344_rails_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64

# User SSH sur ce VPS (Flipflapp utilise souvent `deploy` créé à la main).
ssh:
  user: ubuntu

# accessories:
