# PostgreSQL. Connection for all environments is driven by DATABASE_URL (Neon, local, or host env).
#
# Caution: using the same physical database for development and test can wipe or pollute dev data
# when running tests. Prefer a separate Neon branch/database for test when possible.
#
# Read https://guides.rubyonrails.org/configuring.html#configuring-a-database

default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL") %>

test:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL") %>

# Production: une seule base (Solid multi-DB désactivé — voir docs/SOLID_OPTIONAL.md).
production:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL") %>

